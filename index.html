<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JGA Micha - Die Hochzeitsmeisterschaft</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>JGA Micha 🍻⚽</h1>
        <p>Berlin Edition</p>
        
        <div class="score-container">
            <h2>Punkte: <span id="current-score">0</span> / 100</h2>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar"></div>
            </div>
        </div>
    </header>

    <nav class="app-nav">
        <button id="btn-tasks" class="nav-btn active">Aufgaben</button>
        <button id="btn-quiz" class="nav-btn">Quiz</button>
        <button id="btn-admin" class="nav-btn">Admin</button>
    </nav>

    <main>
        <section id="view-tasks" class="view-section active">
            </section>

        <section id="view-quiz" class="view-section hidden">
            </section>

        <section id="view-admin" class="view-section hidden">
            <h2>Admin Bereich</h2>
            <p>Bitte PIN eingeben:</p>
            <input type="password" id="admin-pin-input" placeholder="****">
            <button id="btn-login">Freischalten</button>
            <p id="admin-error" class="hidden">Falsche PIN!</p>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script src="firebase-config.js"></script>
    <script src="data/tasks.js"></script>
    <script src="data/quiz.js"></script>  <script src="app.js"></script>
</body>
</html>
